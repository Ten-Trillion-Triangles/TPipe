<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPipe Trace Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-panel: #1a1d27;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-amber: #fbbf24;
            --border-color: #2e3344;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        .topbar {
            height: 50px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-blue);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background-color: var(--accent-blue);
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>') no-repeat center;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-red);
            box-shadow: 0 0 8px var(--accent-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(248, 113, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            height: calc(100% - 50px);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trace-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .trace-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .trace-item.active {
            background-color: rgba(56, 189, 248, 0.1);
            border-left: 3px solid var(--accent-blue);
        }

        .trace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trace-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .trace-status {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .status-SUCCESS { background-color: rgba(52, 211, 153, 0.15); color: var(--accent-green); border: 1px solid rgba(52, 211, 153, 0.3); }
        .status-FAILURE { background-color: rgba(248, 113, 113, 0.15); color: var(--accent-red); border: 1px solid rgba(248, 113, 113, 0.3); }
        .status-PENDING { background-color: rgba(251, 191, 36, 0.15); color: var(--accent-amber); border: 1px solid rgba(251, 191, 36, 0.3); }

        .trace-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .trace-id {
            color: #64748b;
        }

        /* Main Content */
        .content {
            flex: 1;
            background-color: var(--bg-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            height: 40px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85rem;
            color: var(--accent-blue);
        }

        #trace-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white; /* Trace HTML often expects white bg */
            flex: 1;
        }

        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 17, 26, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background-color: var(--bg-panel);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            width: 300px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .auth-btn {
            background-color: var(--accent-blue);
            color: #0f111a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2 style="margin-top:0;color:var(--accent-blue);">Authentication Required</h2>
            <input type="password" id="authKey" class="auth-input" placeholder="Enter Authorization Key" />
            <button class="auth-btn" onclick="app.login()">Connect</button>
        </div>
    </div>

    <div class="topbar">
        <div class="logo">
            <div class="logo-icon"></div>
            TPipe TraceServer
        </div>
        <div class="status-container">
            <span id="connectionStatusText">Connecting...</span>
            <div id="liveIndicator" class="live-indicator" style="background-color: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber);"></div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Recent Traces</span>
                <span id="traceCount">0</span>
            </div>
            <div style="padding: 10px 15px; border-bottom: 1px solid var(--border-color);">
                <input type="text" id="searchInput" placeholder="Search traces..." style="width: 100%; padding: 8px; background-color: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; box-sizing: border-box; font-family: inherit;">
            </div>
            <div id="traceList">
                <!-- Trace items injected here -->
            </div>
        </div>

        <div class="content">
            <div class="content-header" id="contentHeader">Select a trace to view details</div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📊</div>
                <div>Waiting for trace executions...</div>
            </div>
            <iframe id="trace-frame" style="display:none;"></iframe>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
